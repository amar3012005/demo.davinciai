# Coolify-compatible TARA EU Service
# Domain: demo.davinciai.eu | Orchestrator WSS exposed on port 8030
#
# ┌─────────────────────────────────────────────────────────────┐
# │ IMPORTANT: No ${VAR:-default} patterns used here.           │
# │ All config comes from Coolify's env var UI or .env.eu.      │
# │ This prevents Coolify from locking variables.               │
# └─────────────────────────────────────────────────────────────┘

services:
  # ═══════════════════════════════════════════════════════════
  # Redis Cache
  # ═══════════════════════════════════════════════════════════
  redis-eu:
    image: redis:7-alpine
    volumes:
      - redis_eu_data:/data
    command: redis-server --appendonly yes --bind 0.0.0.0
    networks:
      eu-stack: null
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=redis-eu
      - coolify.service.subType=database
      - coolify.service.subName=redis

  # ═══════════════════════════════════════════════════════════
  # RAG Service (Internal port 4001)
  # ═══════════════════════════════════════════════════════════
  rag-eu:
    build:
      context: ./rag-eu
      dockerfile: Dockerfile
    command: >
      sh -c 'export LLM_API_KEY="$${LLM_API_KEY:-$$GROQ_API_KEY}"; export GROQ_API_KEY="$${GROQ_API_KEY:-$$LLM_API_KEY}"; python -m uvicorn daytona_agent.services.rag.app:app --host 0.0.0.0 --port 4001'
    volumes:
      - rag_eu_index:/app/index
    environment:
      # Internal service URLs (hardcoded — never change per-env)
      REDIS_URL: redis://redis-eu:6379/0
      COOLIFY_CONTAINER_NAME: rag-eu

      # LLM config (from Coolify env / .env.eu)
      LLM_PROVIDER: "${LLM_PROVIDER}"
      LLM_MODEL: "${LLM_MODEL}"
      ANALYTICS_MODEL: "${ANALYTICS_MODEL}"

      # Organization
      ORGANIZATION_NAME: "${ORGANIZATION_NAME}"
      ORGANIZATION_LOCATION: "${ORGANIZATION_LOCATION}"
      TENANT_ID: "${TENANT_ID}"
      LOG_LEVEL: "${LOG_LEVEL}"

      # Qdrant
      QDRANT_URL: "${QDRANT_URL}"
      QDRANT_API_KEY: "${QDRANT_API_KEY}"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION}"

      # Feature flags (hardcoded for production stability)
      USE_NEW_DETECTIVE: "false"
      USE_MISSION_BRAIN: "false"
      USE_LIVE_GRAPH: "false"
      USE_HIVE_INTERFACE: "false"
      DAYTONA_RAG_ENABLE_CACHE: "false"
      DAYTONA_RAG_CACHE_TTL: "0"
      ENABLE_HIVE_MIND: "${ENABLE_HIVE_MIND}"
      ENABLE_LOCAL_RETRIEVAL: "${ENABLE_LOCAL_RETRIEVAL}"
      ENABLE_INGESTION_SERVICE: "${ENABLE_INGESTION_SERVICE}"
      USE_ULTIMATE_TARA: "${USE_ULTIMATE_TARA}"
      HIVEMIND_IN_VISUAL_COPILOT: "${HIVEMIND_IN_VISUAL_COPILOT}"
      ENABLE_STAGE_AWARE_RETRIEVAL: "${ENABLE_STAGE_AWARE_RETRIEVAL}"
      ENABLE_MICRO_REASONING: "${ENABLE_MICRO_REASONING}"
      POLICY_MODE_DEFAULT: "${POLICY_MODE_DEFAULT}"
      RAG_FAST_LOCAL_MODE: "${RAG_FAST_LOCAL_MODE}"
      DAVINCIAI_BACKEND_URL: "${DAVINCIAI_BACKEND_URL}"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "24826665-41d6-4ea6-b13f-fc42438c4c55.eu-central-1-0.aws.cloud.qdrant.io:3.126.6.235"
      - "878ba705-a90e-44d7-96fc-782399dd97ae.europe-west3-0.gcp.cloud.qdrant.io:34.107.67.89"
    networks:
      eu-stack: null
    restart: unless-stopped
    depends_on:
      redis-eu:
        condition: service_healthy
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=rag-eu
      - coolify.service.subType=application
      - coolify.service.subName=rag
    env_file:
      - .env.eu

  # ═══════════════════════════════════════════════════════════
  # STT Service (Internal port 4002) — Groq Whisper
  # ═══════════════════════════════════════════════════════════
  stt-eu:
    build:
      context: ./stt_groq_whisper
      dockerfile: Dockerfile
    command: >
      sh -c 'export GROQ_API_KEY="$${GROQ_API_KEY:-$$LLM_API_KEY}"; uvicorn app:app --host 0.0.0.0 --port 4002'
    environment:
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: "${LOG_LEVEL}"

      # STT model & language
      GROQ_WHISPER_MODEL: "${GROQ_WHISPER_MODEL}"
      GROQ_LANGUAGE: "${GROQ_LANGUAGE}"
      ENABLE_MICRO_CHUNKING: "${ENABLE_MICRO_CHUNKING}"
      CHUNK_DURATION_MS: "${CHUNK_DURATION_MS}"
      OVERLAP_DURATION_MS: "${OVERLAP_DURATION_MS}"
      CONTEXT_WINDOW_SEGMENTS: "${CONTEXT_WINDOW_SEGMENTS}"

      # VAD tuning
      VAD_ENERGY_THRESHOLD: "${VAD_ENERGY_THRESHOLD}"
      SPEECH_START_TRIGGER_MS: "${SPEECH_START_TRIGGER_MS}"
      MIN_SPEECH_DURATION_MS: "${MIN_SPEECH_DURATION_MS}"
      MIN_SILENCE_DURATION_MS: "${MIN_SILENCE_DURATION_MS}"
      PRE_SPEECH_PADDING_MS: "${PRE_SPEECH_PADDING_MS}"
      FINAL_SILENCE_PADDING_MS: "${FINAL_SILENCE_PADDING_MS}"
      FINALIZATION_WAIT_MS: "${FINALIZATION_WAIT_MS}"

      # Adaptive endpointing
      STT_ADAPTIVE_ENDPOINTING: "${STT_ADAPTIVE_ENDPOINTING}"
      CONTINUATION_SILENCE_BONUS_MS: "${CONTINUATION_SILENCE_BONUS_MS}"
      CONTINUATION_WORD_THRESHOLD: "${CONTINUATION_WORD_THRESHOLD}"
      CONTINUATION_MIN_DURATION_MS: "${CONTINUATION_MIN_DURATION_MS}"
      STT_CALLBACK_TIMEOUT_SECONDS: "${STT_CALLBACK_TIMEOUT_SECONDS}"

      # Internal service URLs (hardcoded)
      STT_GROQ_HOST: 0.0.0.0
      STT_GROQ_PORT: 4002
      ORCHESTRATOR_WS_URL: "wss://orchestrator-eu:4004/ws"
      STT_SKIP_SSL_VERIFY: "true"
      ORCHESTRATOR_SKIP_SSL_VERIFY: "true"
      COOLIFY_CONTAINER_NAME: stt-eu
    healthcheck:
      test:
        - CMD
        - python
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:4002/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      eu-stack: null
    restart: unless-stopped
    depends_on:
      - orchestrator-eu
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=stt-eu
      - coolify.service.subType=application
      - coolify.service.subName=stt
    env_file:
      - .env.eu

  # ═══════════════════════════════════════════════════════════
  # TTS Service (Internal port 4003) — Cartesia
  # ═══════════════════════════════════════════════════════════
  tts-eu:
    build:
      context: ./tts_cartesia
      dockerfile: Dockerfile
    command: "python -m uvicorn app:app --host 0.0.0.0 --port 4003"
    environment:
      # Internal service config (hardcoded)
      TTS_CARTESIA_HOST: 0.0.0.0
      TTS_CARTESIA_PORT: 4003
      COOLIFY_CONTAINER_NAME: tts-eu
      LOG_LEVEL: "${LOG_LEVEL}"
      CONNECTION_POOL_SIZE: "${CONNECTION_POOL_SIZE}"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4003/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      eu-stack: null
    restart: unless-stopped
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=tts-eu
      - coolify.service.subType=application
      - coolify.service.subName=tts
    env_file:
      - .env.eu

  # ═══════════════════════════════════════════════════════════
  # Visual Copilot Service (Internal port 4005)
  # ═══════════════════════════════════════════════════════════
  visual-copilot-eu:
    build:
      context: ./rag-visual-copilot
      dockerfile: Dockerfile
    command: >
      sh -c 'export GROQ_API_KEY="$${GROQ_API_KEY:-$$LLM_API_KEY}"; python -m uvicorn app:app --host 0.0.0.0 --port 4005'
    environment:
      # Internal service config (hardcoded)
      REDIS_URL: redis://redis-eu:6379/0
      PORT: "4005"
      COOLIFY_CONTAINER_NAME: visual-copilot-eu

      # LLM config
      LLM_MODEL: "${LLM_MODEL}"
      ANALYTICS_MODEL: "${ANALYTICS_MODEL}"
      MIND_READER_MODEL: "${MIND_READER_MODEL}"

      # Qdrant
      QDRANT_URL: "${QDRANT_URL}"
      QDRANT_API_KEY: "${QDRANT_API_KEY}"
      QDRANT_COLLECTION: "${QDRANT_COLLECTION}"

      LOG_LEVEL: "${LOG_LEVEL}"
      TENANT_ID: "${TENANT_ID}"
    restart: unless-stopped
    depends_on:
      redis-eu:
        condition: service_healthy
    extra_hosts:
      - "24826665-41d6-4ea6-b13f-fc42438c4c55.eu-central-1-0.aws.cloud.qdrant.io:3.126.6.235"
      - "878ba705-a90e-44d7-96fc-782399dd97ae.europe-west3-0.gcp.cloud.qdrant.io:34.107.67.89"
    networks:
      eu-stack: null
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=visual-copilot-eu
      - coolify.service.subType=application
      - coolify.service.subName=visual-copilot
    env_file:
      - .env.eu

  # ═══════════════════════════════════════════════════════════
  # Orchestrator (Internal 4004 → External 8030 with SSL for WSS)
  # ═══════════════════════════════════════════════════════════
  orchestrator-eu:
    build:
      context: ./Orchestrator-eu
      dockerfile: Dockerfile
    command: "uvicorn app:app --host 0.0.0.0 --port 4004 --ssl-keyfile /certs/privkey.pem --ssl-certfile /certs/fullchain.pem --ws-ping-interval 0"
    ports:
      - "8030:4004"
    volumes:
      - /etc/letsencrypt/live/demo.davinciai.eu/fullchain.pem:/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/demo.davinciai.eu/privkey.pem:/certs/privkey.pem:ro
    environment:
      # Internal service URLs (hardcoded — never change per-env)
      REDIS_URL: redis://redis-eu:6379/0
      RAG_SERVICE_URL: http://rag-eu:4001
      STT_SERVICE_URL: http://stt-eu:4002
      TTS_SERVICE_URL: http://tts-eu:4003
      VISUAL_COPILOT_SERVICE_URL: http://visual-copilot-eu:4005

      # Production URLs (hardcoded for this deployment)
      PUBLIC_URL: "https://demo.davinciai.eu:8030"
      ORCHESTRATOR_WS_URL: "wss://demo.davinciai.eu:8030/ws"
      WIDGET_WS_URL: "wss://demo.davinciai.eu:8030/ws"

      # Organization
      ORGANIZATION_NAME: "${ORGANIZATION_NAME}"
      ORGANIZATION_FULL_NAME: "${ORGANIZATION_FULL_NAME}"
      AGENT_NAME: "${AGENT_NAME}"
      AGENT_ID: "${AGENT_ID}"
      TENANT_ID: "${TENANT_ID}"

      # Runtime config
      STREAM_OUT: "${STREAM_OUT}"
      SUPPORTED_LANGUAGES: "${SUPPORTED_LANGUAGES}"
      ENABLE_FILLERS: "${ENABLE_FILLERS}"
      BARGIN_FEATURE: "${BARGIN_FEATURE}"
      DEFAULT_INTRO: "${DEFAULT_INTRO}"
      DEFAULT_INTRO_DE: "${DEFAULT_INTRO_DE}"
      BUNDB_CARTESIA_PRONUNCIATION_DICT_ID: "${BUNDB_CARTESIA_PRONUNCIATION_DICT_ID}"
      LOG_LEVEL: "${LOG_LEVEL}"

      # Backend & routing
      DAVINCIAI_BACKEND_URL: "${DAVINCIAI_BACKEND_URL}"
      AGENT_HOST_SUFFIX: "${AGENT_HOST_SUFFIX}"
      GLOBAL_CLIENT_URL: "${GLOBAL_CLIENT_URL}"
      FORCE_GLOBAL_DOMAIN: "${FORCE_GLOBAL_DOMAIN}"

      # Feature flags (hardcoded for production stability)
      USE_ULTIMATE_TARA: "false"
      ENABLE_STRATEGIC_POLICY: "${ENABLE_STRATEGIC_POLICY}"
      ENABLE_LIVE_MEMORY_EXTRACTION: "${ENABLE_LIVE_MEMORY_EXTRACTION}"
      ENABLE_STAGE_AWARE_RETRIEVAL: "${ENABLE_STAGE_AWARE_RETRIEVAL}"
      ENABLE_MICRO_REASONING: "${ENABLE_MICRO_REASONING}"
      POLICY_MODE_DEFAULT: "${POLICY_MODE_DEFAULT}"

      # FSM Appointment Booking
      FSM_APPOINTMENT_SCHEMA_JSON: "${FSM_APPOINTMENT_SCHEMA_JSON}"
      FSM_ALLOW_RAG_DETOUR: "${FSM_ALLOW_RAG_DETOUR}"
      FSM_MAX_DETOURS_PER_FIELD: "${FSM_MAX_DETOURS_PER_FIELD}"
      FSM_MAX_RETRIES: "${FSM_MAX_RETRIES}"

      # Orchestrator tuning
      ORCHESTRATOR_TRANSCRIPT_TIMEOUT_S: "${ORCHESTRATOR_TRANSCRIPT_TIMEOUT_S}"
      ORCHESTRATOR_BARGE_IN_VALIDATION_TIMEOUT_S: "${ORCHESTRATOR_BARGE_IN_VALIDATION_TIMEOUT_S}"
      ORCHESTRATOR_BATCH_TTS: "${ORCHESTRATOR_BATCH_TTS}"

      COOLIFY_CONTAINER_NAME: orchestrator-eu
    networks:
      eu-stack: null
    restart: unless-stopped
    depends_on:
      redis-eu:
        condition: service_healthy
      rag-eu:
        condition: service_started
      tts-eu:
        condition: service_started
      visual-copilot-eu:
        condition: service_started
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=orchestrator-eu
      - coolify.service.subType=application
      - coolify.service.subName=orchestrator
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.routers.orchestrator-eu-https.entryPoints=https
      - traefik.http.routers.orchestrator-eu-https.rule=Host(`demo.davinciai.eu`)
      - traefik.http.routers.orchestrator-eu-https.tls=true
      - traefik.http.services.orchestrator-eu-https.loadbalancer.server.port=4004
      - traefik.http.services.orchestrator-eu-https.loadbalancer.server.scheme=https
    env_file:
      - .env.eu

volumes:
  redis_eu_data:
    name: redis_eu_data
  rag_eu_index:
    name: rag_eu_index

networks:
  coolify:
    external: true
  eu-stack:
    name: eu-stack
    external: true
