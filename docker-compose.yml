# Coolify-compatible TARA Optimized Service
# Domain: demo.davinciai.eu | Orchestrator WSS exposed on port 8010
# All env vars are inline to match local behavior exactly

services:
  # ═══════════════════════════════════════════════════════════
  # Redis Cache
  # ═══════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    volumes:
      - tara_optimized_redis_data:/data
    command: redis-server --appendonly yes --bind 0.0.0.0
    networks:
      tara-optimized: null
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=redis-tara-optimized
      - coolify.service.subType=database
      - coolify.service.subName=redis
    environment:
      COOLIFY_CONTAINER_NAME: redis-tara-optimized
    env_file:
      - .env

  # ═══════════════════════════════════════════════════════════
  # RAG Service (Port 5001) — Uses Groq LLM
  # ═══════════════════════════════════════════════════════════
  rag:
    build:
      context: ./rag-daytona.v2
      dockerfile: Dockerfile
    volumes:
      - tara_optimized_rag_index:/app/index
    environment:
      # LLM Configuration — MUST be groq, NOT gemini
      LLM_PROVIDER: groq
      LLM_API_KEY: ${LLM_API_KEY:-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}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-oss-120b}
      ANALYTICS_MODEL: ${ANALYTICS_MODEL:-qwen/qwen3-32b}

      # Mind Reader
      MIND_READER_MODEL: ${MIND_READER_MODEL:-llama-3.1-8b-instant}

      # Qdrant (Hive Mind)
      QDRANT_URL: ${QDRANT_URL:-https://878ba705-a90e-44d7-96fc-782399dd97ae.europe-west3-0.gcp.cloud.qdrant.io:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-tara_hive}
      ENABLE_HIVE_MIND: "true"
      ENABLE_LOCAL_RETRIEVAL: "false"

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Feature Flags
      USE_NEW_DETECTIVE: "true"
      USE_MISSION_BRAIN: "true"
      USE_LIVE_GRAPH: "true"
      USE_HIVE_INTERFACE: "true"

      # Logging & Identity
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TENANT_ID: tara
      DAYTONA_RAG_ENABLE_CACHE: "false"
      DAYTONA_RAG_CACHE_TTL: "0"

      COOLIFY_CONTAINER_NAME: rag-tara-optimized
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: "python -m uvicorn daytona_agent.services.rag.app:app --host 0.0.0.0 --port 5001"
    networks:
      tara-optimized: null
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=rag-tara-optimized
      - coolify.service.subType=application
      - coolify.service.subName=rag
    env_file:
      - .env

  # ═══════════════════════════════════════════════════════════
  # STT Service (Port 5002) — Sarvam Codemix Mode
  # ═══════════════════════════════════════════════════════════
  stt:
    build:
      context: ./stt_sarvam
      dockerfile: Dockerfile
    environment:
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: INFO
      SARVAM_API_KEY: ${SARVAM_API_KEY:-sk_estz3g3w_AEzxGTk7OV6lmQyE69cIceBI}
      SARVAM_MODEL: saaras:v3
      SARVAM_VAD_SIGNALS: "true"
      SARVAM_HIGH_VAD: "false"
      SARVAM_FLUSH_SIGNAL: "true"
      SARVAM_MODE: codemix
      SARVAM_ENDPOINT_MODE: stt
      SARVAM_LANGUAGE_CODE: "te-IN"
      SARVAM_FORWARD_INTERVAL_MS: "80"
      SARVAM_FLUSH_TIMEOUT_MS: "1200"
      SARVAM_VAD_SILENCE_MS: "900"
      # config.py reads HOST and PORT (not STT_HOST / STT_PORT)
      HOST: 0.0.0.0
      PORT: 5002
      # Orchestrator has SSL, must use wss://
      ORCHESTRATOR_WS_URL: "wss://orchestrator:5004/ws"
      SKIP_SSL_VERIFY: "true"
      COOLIFY_CONTAINER_NAME: stt-tara-optimized
    command: "uvicorn app:app --host 0.0.0.0 --port 5002"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      tara-optimized: null
    restart: unless-stopped
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=stt-tara-optimized
      - coolify.service.subType=application
      - coolify.service.subName=stt
    # NOTE: No env_file here — Coolify's .env overrides SARVAM_MODE and ORCHESTRATOR_WS_URL with wrong values

    # ═══════════════════════════════════════════════════════════
    # TTS Service (Port 5003) — Cartesia
    # ═══════════════════════════════════════════════════════════
  tts:
    build:
      context: ./tts_cartesia
      dockerfile: Dockerfile
    environment:
      CARTESIA_API_KEY: ${CARTESIA_API_KEY:-sk_car_k6RiuJVp2gEzAP6ozyCrdp}
      CARTESIA_VOICE_ID: ${CARTESIA_VOICE_ID:-07bc462a-c644-49f1-baf7-82d5599131be}
      CARTESIA_OUTPUT_FORMAT: ${CARTESIA_OUTPUT_FORMAT:-pcm_f32le}
      CARTESIA_SAMPLE_RATE: ${CARTESIA_SAMPLE_RATE:-44100}
      CARTESIA_MODEL: ${CARTESIA_MODEL:-sonic-3}
      TTS_CARTESIA_PORT: 5003
      COOLIFY_CONTAINER_NAME: tts-tara-optimized
    command: "python -m uvicorn app:app --host 0.0.0.0 --port 5003"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5003/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      tara-optimized: null
    restart: unless-stopped
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=tts-tara-optimized
      - coolify.service.subType=application
      - coolify.service.subName=tts
    env_file:
      - .env

  # ═══════════════════════════════════════════════════════════
  # Orchestrator (Port 5004 → External 8010 with SSL for WSS)
  # ═══════════════════════════════════════════════════════════
  orchestrator:
    build:
      context: ./orchestra_daytona.v2
      dockerfile: Dockerfile
    ports:
      - "8010:5004"
    volumes:
      - /etc/letsencrypt/live/demo.davinciai.eu/fullchain.pem:/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/demo.davinciai.eu/privkey.pem:/certs/privkey.pem:ro
    environment:
      # Redis
      REDIS_URL: redis://redis:6379/0

      # Organization
      ORGANIZATION_NAME: "TASK"
      ORGANIZATION_FULL_NAME: "TASK"
      KNOWLEDGE_BASE_PATH: "/app/daytona_knowledge_base"

      # Agent
      AGENT_NAME: "TARA"
      AGENT_ID: "tara"
      TENANT_ID: tara
      CARTESIA_PRONUNCIATION_DICT_ID: ${CARTESIA_PRONUNCIATION_DICT_ID:-"pdict_19NTe4RAAHgG8UbibcAcLG"}

      # Internal service URLs (plain HTTP inside Docker network)
      RAG_SERVICE_URL: http://rag:5001
      STT_SERVICE_URL: http://stt:5002
      TTS_SERVICE_URL: http://tts:5003

      # External-facing URLs (SSL via certs)
      PUBLIC_URL: "https://demo.davinciai.eu:8010"
      ORCHESTRATOR_WS_URL: "wss://demo.davinciai.eu:8010/ws"
      WIDGET_WS_URL: "wss://demo.davinciai.eu:8010/ws"

      # Features
      ENABLE_FILLERS: "false"
      STREAM_OUT: "auto"
      SUPPORTED_LANGUAGES: "en,de,te-IN,hi-IN,ta-IN,kn-IN"
      FSM_APPOINTMENT_URL: "https://cal.com/amar-nadig-uy2g3b/30min"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      COOLIFY_CONTAINER_NAME: orchestrator-tara-optimized
    command: "uvicorn app:app --host 0.0.0.0 --port 5004 --ssl-keyfile /certs/privkey.pem --ssl-certfile /certs/fullchain.pem --ws-ping-interval 0"
    networks:
      tara-optimized: null
    restart: unless-stopped
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=orchestrator-tara-optimized
      - coolify.service.subType=application
      - coolify.service.subName=orchestrator
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.routers.orchestrator-https.entryPoints=https
      - traefik.http.routers.orchestrator-https.rule=Host(`demo.davinciai.eu`)
      - traefik.http.routers.orchestrator-https.tls=true
      - traefik.http.services.orchestrator-https.loadbalancer.server.port=5004
      - traefik.http.services.orchestrator-https.loadbalancer.server.scheme=https
    env_file:
      - .env

# Named volumes for persistence
volumes:
  tara_optimized_redis_data:
    name: tara_optimized_redis_data
  tara_optimized_rag_index:
    name: tara_optimized_rag_index

# Networks
networks:
  coolify:
    external: true
  tara-optimized:
    name: tara-optimized
    external: true
