# Coolify-compatible TARA Optimized Service
# Domain: demo.davinciai.eu | Orchestrator WSS exposed on port 8010
# Place this in /data/coolify/services/<service-id>/docker-compose.yml

services:
  # Redis Cache (Required for optimizations)
  redis:
    image: redis:7-alpine
    volumes:
      - tara_optimized_redis_data:/data
    command: redis-server --appendonly yes --bind 0.0.0.0
    networks:
      tara-optimized: null
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=redis-tara-optimized
      - coolify.service.subType=database
      - coolify.service.subName=redis
    environment:
      COOLIFY_CONTAINER_NAME: redis-tara-optimized
    env_file:
      - .env

  # RAG Service (Port 5001)
  rag:
    build:
      context: ./rag-daytona.v2
      dockerfile: Dockerfile
    volumes:
      - tara_optimized_rag_index:/app/index
    environment:
      COOLIFY_CONTAINER_NAME: rag-tara-optimized
    command: "python -m uvicorn daytona_agent.services.rag.app:app --host 0.0.0.0 --port 5001"
    networks:
      tara-optimized: null
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=rag-tara-optimized
      - coolify.service.subType=application
      - coolify.service.subName=rag
    env_file:
      - .env

  # STT Service (Port 5002) — Internal only, no SSL needed
  stt:
    build:
      context: ./stt_sarvam
      dockerfile: Dockerfile
    environment:
      COOLIFY_CONTAINER_NAME: stt-tara-optimized
    command: "uvicorn app:app --host 0.0.0.0 --port 5002"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      tara-optimized: null
    restart: unless-stopped
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=stt-tara-optimized
      - coolify.service.subType=application
      - coolify.service.subName=stt
    env_file:
      - .env

  # TTS Service (Port 5003)
  tts:
    build:
      context: ./tts_cartesia
      dockerfile: Dockerfile
    environment:
      COOLIFY_CONTAINER_NAME: tts-tara-optimized
    command: "python -m uvicorn app:app --host 0.0.0.0 --port 5003"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5003/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      tara-optimized: null
    restart: unless-stopped
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=tts-tara-optimized
      - coolify.service.subType=application
      - coolify.service.subName=tts
    env_file:
      - .env

  # Orchestrator (Port 5004 internal → 8010 external with SSL for WSS)
  orchestrator:
    build:
      context: ./orchestra_daytona.v2
      dockerfile: Dockerfile
    ports:
      - "8010:5004" # External WSS port mapped to internal 5004
    volumes:
      - /etc/letsencrypt/live/demo.davinciai.eu/fullchain.pem:/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/demo.davinciai.eu/privkey.pem:/certs/privkey.pem:ro
    environment:
      COOLIFY_CONTAINER_NAME: orchestrator-tara-optimized
      PUBLIC_URL: "https://demo.davinciai.eu:8010"
      ORCHESTRATOR_WS_URL: "wss://demo.davinciai.eu:8010/ws"
    command: "uvicorn app:app --host 0.0.0.0 --port 5004 --ssl-keyfile /certs/privkey.pem --ssl-certfile /certs/fullchain.pem --ws-ping-interval 0"
    networks:
      tara-optimized: null
    restart: unless-stopped
    labels:
      - coolify.managed=true
      - coolify.type=service
      - coolify.name=orchestrator-tara-optimized
      - coolify.service.subType=application
      - coolify.service.subName=orchestrator
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.routers.orchestrator-https.entryPoints=https
      - traefik.http.routers.orchestrator-https.rule=Host(`demo.davinciai.eu`)
      - traefik.http.routers.orchestrator-https.tls=true
      - traefik.http.services.orchestrator-https.loadbalancer.server.port=5004
      - traefik.http.services.orchestrator-https.loadbalancer.server.scheme=https
    env_file:
      - .env

# Named volumes for persistence
volumes:
  tara_optimized_redis_data:
    name: tara_optimized_redis_data
  tara_optimized_rag_index:
    name: tara_optimized_rag_index

# Networks
networks:
  coolify:
    external: true
  tara-optimized:
    name: tara-optimized
    external: true
