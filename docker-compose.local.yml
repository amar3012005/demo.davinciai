services:
  # ═══════════════════════════════════════════════════════════
  # REDIS - Required for Live Graph and Mission State
  # ═══════════════════════════════════════════════════════════
  redis:
    image: 'redis:7-alpine'
    container_name: redis-local
    ports:
      - '6379:6379'
    command: 'redis-server --appendonly yes --bind 0.0.0.0'
    restart: unless-stopped
    volumes:
      - redis-data:/data

  # ═══════════════════════════════════════════════════════════
  # RAG Service (with Ultimate TARA modules)
  # ═══════════════════════════════════════════════════════════
  rag:
    build:
      context: ./rag-daytona.v2
      dockerfile: Dockerfile
    container_name: rag-local
    env_file:
      - .env
    environment:
      # LLM Configuration
      LLM_PROVIDER: groq
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama-3.1-8b-instant}
      ANALYTICS_MODEL: ${ANALYTICS_MODEL:-qwen/qwen3-32b}

      # Ultimate TARA - Mind Reader
      MIND_READER_MODEL: ${MIND_READER_MODEL:-llama-3.1-8b-instant}

      # Ultimate TARA - Hive Interface (Qdrant)
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-tara_hive}
      ENABLE_HIVE_MIND: ${ENABLE_HIVE_MIND:-true}
      ENABLE_LOCAL_RETRIEVAL: "false"

      # Ultimate TARA - Live Graph (Redis)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

      # Feature Flags
      USE_NEW_DETECTIVE: ${USE_NEW_DETECTIVE:-true}
      USE_MISSION_BRAIN: ${USE_MISSION_BRAIN:-true}
      USE_LIVE_GRAPH: ${USE_LIVE_GRAPH:-true}
      USE_HIVE_INTERFACE: ${USE_HIVE_INTERFACE:-true}
      ENABLE_PRE_ROUTER_VISION: ${ENABLE_PRE_ROUTER_VISION:-true}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TENANT_ID: ${TENANT_ID:-tara}
      DAYTONA_RAG_ENABLE_CACHE: "false"
      DAYTONA_RAG_CACHE_TTL: "0"
      LIVE_GRAPH_SCAN_PATH: /app/daytona_agent/services/orchestra_daytona.v2/live_graph_scan.md

      # Model cache - use local files only (no HuggingFace network calls)
      TRANSFORMERS_OFFLINE: "1"
      HF_DATASETS_OFFLINE: "1"

      # Remote Embeddings Configuration
      EMBEDDINGS_SERVICE_URL: "http://embeddings-eu-local:4006/embed"

    dns:
      - 8.8.8.8
      - 1.1.1.1

    ports:
      - '8003:8003'
    volumes:
      - rag-index:/app/index
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ./orchestra_daytona.v2:/app/daytona_agent/services/orchestra_daytona.v2
      - ./rag-daytona.v2/visual_copilot:/app/visual_copilot
      - ./rag-daytona.v2/visual_copilot:/app/daytona_agent/services/rag/visual_copilot
      - ./rag-daytona.v2/ultimate_api.py:/app/ultimate_api.py
      - ./rag-daytona.v2/ultimate_api.py:/app/daytona_agent/services/rag/ultimate_api.py
      - ./rag-daytona.v2/app.py:/app/app.py
      - ./rag-daytona.v2/app.py:/app/daytona_agent/services/rag/app.py
      - ./rag-daytona.v2/hive_interface.py:/app/hive_interface.py
      - ./rag-daytona.v2/hive_interface.py:/app/daytona_agent/services/rag/hive_interface.py
      - ./rag-daytona.v2/mission_brain.py:/app/mission_brain.py
      - ./rag-daytona.v2/mission_brain.py:/app/daytona_agent/services/rag/mission_brain.py
      - ./rag-daytona.v2/mind_reader.py:/app/mind_reader.py
      - ./rag-daytona.v2/mind_reader.py:/app/daytona_agent/services/rag/mind_reader.py
      - ./rag-daytona.v2/mind_reader_domain_prompts:/app/mind_reader_domain_prompts
      - ./rag-daytona.v2/mind_reader_domain_prompts:/app/daytona_agent/services/rag/mind_reader_domain_prompts
      - ./rag-daytona.v2/semantic_detective.py:/app/semantic_detective.py
      - ./rag-daytona.v2/semantic_detective.py:/app/daytona_agent/services/rag/semantic_detective.py
      - ./rag-daytona.v2/live_graph.py:/app/live_graph.py
      - ./rag-daytona.v2/live_graph.py:/app/daytona_agent/services/rag/live_graph.py
      - ./rag-daytona.v2/tara_models.py:/app/tara_models.py
      - ./rag-daytona.v2/tara_models.py:/app/daytona_agent/services/rag/tara_models.py
      - ./rag-daytona.v2/remote_embeddings.py:/app/remote_embeddings.py
      - ./rag-daytona.v2/remote_embeddings.py:/app/daytona_agent/services/rag/remote_embeddings.py
      - ./rag-daytona.v2/optimized_embeddings.py:/app/optimized_embeddings.py
      - ./rag-daytona.v2/optimized_embeddings.py:/app/daytona_agent/services/rag/optimized_embeddings.py
      - ./rag-daytona.v2/rag_engine.py:/app/rag_engine.py
      - ./rag-daytona.v2/rag_engine.py:/app/daytona_agent/services/rag/rag_engine.py
    command: "python -m uvicorn daytona_agent.services.rag.app:app --host 0.0.0.0 --port 8003"
    restart: unless-stopped
    networks:
      - default
      - eu-stack
    depends_on:
      - redis

  # ═══════════════════════════════════════════════════════════
  # STT Service
  # ═══════════════════════════════════════════════════════════
  stt:
    build:
      context: ./stt_sarvam
      dockerfile: Dockerfile
    container_name: stt-local
    environment:
      PYTHONUNBUFFERED: 1
      LOG_LEVEL: INFO
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
      SARVAM_MODEL: ${SARVAM_MODEL:-saaras:v3}
      SARVAM_VAD_SIGNALS: 'true'
      SARVAM_HIGH_VAD: 'false'
      SARVAM_FLUSH_SIGNAL: 'true'
      SARVAM_MODE: 'codemix'
      SARVAM_ENDPOINT_MODE: 'stt'
      SARVAM_LANGUAGE_CODE: "te-IN"
      SARVAM_FORWARD_INTERVAL_MS: '80'
      SARVAM_FLUSH_TIMEOUT_MS: '1200'
      SARVAM_VAD_SILENCE_MS: '900'
      HOST: 0.0.0.0
      PORT: 8002
      ORCHESTRATOR_WS_URL: 'ws://orchestrator:8004/ws'
      SKIP_SSL_VERIFY: 'true'
    ports:
      - '8002:8002'
    command: 'uvicorn app:app --host 0.0.0.0 --port 8002'
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # TTS Service
  # ═══════════════════════════════════════════════════════════
  tts:
    build:
      context: ./tts_cartesia
      dockerfile: Dockerfile
    container_name: tts-local
    environment:
      CARTESIA_API_KEY: ${CARTESIA_API_KEY:-}
      CARTESIA_VOICE_ID: ${CARTESIA_VOICE_ID:-ca566b43-944e-4474-b494-7d9f0695f307}
      CARTESIA_OUTPUT_FORMAT: ${CARTESIA_OUTPUT_FORMAT:-pcm_f32le}
      CARTESIA_SAMPLE_RATE: ${CARTESIA_SAMPLE_RATE:-44100}
      CARTESIA_MODEL: ${CARTESIA_MODEL:-sonic-3}
    ports:
      - '8000:8000'
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # Sarvam TTS Service
  # ═══════════════════════════════════════════════════════════
  tts_sarvam:
    build:
      context: ./tts_sarvam
      dockerfile: Dockerfile
    container_name: tts-sarvam-local
    environment:
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
      SARVAM_MODEL: ${SARVAM_MODEL:-bulbul:v3-beta}
      SARVAM_VOICE_ID: ${SARVAM_VOICE_ID:-aditya}
      SARVAM_SAMPLE_RATE: ${SARVAM_SAMPLE_RATE:-24000}
    ports:
      - '8001:8001'
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════
  # Orchestrator (with Ultimate TARA WebSocket handlers)
  # ═══════════════════════════════════════════════════════════
  orchestrator:
    build:
      context: ./orchestra_daytona.v2
      dockerfile: Dockerfile
    container_name: orchestrator-local
    env_file:
      - .env
    ports:
      - '8004:8004'
      - '8080:8004'
    environment:
      # Redis Connection
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}

      # Organization
      ORGANIZATION_NAME: "TASK"
      ORGANIZATION_FULL_NAME: "TASK"
      KNOWLEDGE_BASE_PATH: "/app/daytona_knowledge_base"

      # Agent
      AGENT_NAME: "TARA"
      AGENT_ID: "tara"
      TENANT_ID: ${TENANT_ID:-tara}
      CARTESIA_PRONUNCIATION_DICT_ID: ${CARTESIA_PRONUNCIATION_DICT_ID:-"pdict_19NTe4RAAHgG8UbibcAcLG"}

      # Service URLs
      RAG_SERVICE_URL: ${RAG_SERVICE_URL:-http://rag:8003}
      VISUAL_COPILOT_SERVICE_URL: http://visual-copilot-eu-local:4005
      RAG_VISUAL_COPILOT_URL: http://visual-copilot-eu-local:4005
      STT_SERVICE_URL: ${STT_SERVICE_URL:-http://stt:8002}
      TTS_SERVICE_URL: ${TTS_SERVICE_URL:-http://tts:8000}

      # WebSocket Configuration (LOCAL - no SSL)
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8004}
      ORCHESTRATOR_WS_URL: ${ORCHESTRATOR_WS_URL:-ws://localhost:8004/ws}
      WIDGET_WS_URL: ${WIDGET_WS_URL:-ws://localhost:8004/ws}

      # Features
      ENABLE_FILLERS: ${ENABLE_FILLERS:-false}
      STREAM_OUT: ${STREAM_OUT:-auto}
      SUPPORTED_LANGUAGES: ${SUPPORTED_LANGUAGES:-en,de,te-IN,hi-IN,ta-IN,kn-IN}
      FSM_APPOINTMENT_URL: ${FSM_APPOINTMENT_URL:-https://cal.com/amar-nadig-uy2g3b/30min}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Groq API Key (for Analyse Page narration)
      GROQ_API_KEY: ${LLM_API_KEY:-}

    command: "uvicorn app:app --host 0.0.0.0 --port 8004 --ws-ping-interval 0"
    dns:
      - 8.8.8.8
    restart: unless-stopped
    networks:
      - default
      - eu-stack
    depends_on:
      - redis
      - rag
  # ═══════════════════════════════════════════════════════════
  # Qdrant (Optional - Local Vector Database)
  # Comment out if using cloud Qdrant
  # ═══════════════════════════════════════════════════════════

volumes:
  redis-data:
  rag-index:
  qdrant-storage:


networks:
  default:
    name: tara-local-network
  eu-stack:
    external: true
    name: tara-eu_eu-local
